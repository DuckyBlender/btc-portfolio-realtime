services:
  btc-tracker:
    build: .
    container_name: btc-portfolio-tracker
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    networks:
      - btc-network

  nginx:
    image: nginx:alpine
    container_name: btc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - btc-tracker
    networks:
      - btc-network

networks:
  btc-network:
    driver: bridge
